<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Palindrome Checker</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <h1 id="title">Is it a Palindrome?</h1>
        <div id="input-container">
            <input type="text" id="text-input" placeholder="Enter text here">
            <button id="check-btn">Check</button>
        </div>
        <p id="result"></p>
        </div>
    <div class="explanation">💡 A palindrome is a word or sentence that's spelled the same way both forward and backward, ignoring punctuation, case, and spacing. </div>
    <script src="script.js"></script>
</body>

</html>
