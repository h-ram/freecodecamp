<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="styles.css" />
    <title>Drum Machine</title>
  </head>
  <body>
    <div id="drum-machine">
      <div id="pad-bank">
        <button id="drum-q" class="drum-pad">
          Q
          <audio
            class="clip"
            src="https://cdn.freecodecamp.org/curriculum/drum/Heater-1.mp3"
            id="Q"
          ></audio>
        </button>
        <button id="drum-w" class="drum-pad">
          W
          <audio
            class="clip"
            src="https://cdn.freecodecamp.org/curriculum/drum/Heater-2.mp3"
            id="W"
          ></audio>
        </button>
        <button id="drum-e" class="drum-pad">
          E
          <audio
            class="clip"
            src="https://cdn.freecodecamp.org/curriculum/drum/Heater-3.mp3"
            id="E"
          ></audio>
        </button>
        <button id="drum-a" class="drum-pad">
          A
          <audio
            class="clip"
            src="https://cdn.freecodecamp.org/curriculum/drum/Heater-4_1.mp3"
            id="A"
          ></audio>
        </button>
        <button id="drum-s" class="drum-pad">
          S
          <audio
            class="clip"
            src="https://cdn.freecodecamp.org/curriculum/drum/Heater-6.mp3"
            id="S"
          ></audio>
        </button>
        <button id="drum-d" class="drum-pad">
          D
          <audio
            class="clip"
            src="https://cdn.freecodecamp.org/curriculum/drum/Dsc_Oh.mp3"
            id="D"
          ></audio>
        </button>
        <button id="drum-z" class="drum-pad">
          Z
          <audio
            class="clip"
            src="https://cdn.freecodecamp.org/curriculum/drum/Kick_n_Hat.mp3"
            id="Z"
          ></audio>
        </button>
        <button id="drum-x" class="drum-pad">
          X
          <audio
            class="clip"
            src="https://cdn.freecodecamp.org/curriculum/drum/RP4_KICK_1.mp3"
            id="X"
          ></audio>
        </button>
        <button id="drum-c" class="drum-pad">
          C
          <audio
            class="clip"
            src="https://cdn.freecodecamp.org/curriculum/drum/Cev_H2.mp3"
            id="C"
          ></audio>
        </button>
      </div>

      <p id="display">[screen]</p>
    </div>
    <footer hidden>Made by h-ram on 05 March 2026 At 1:50AM</footer>
    <script src="script.js"></script>
  </body>
</html>
